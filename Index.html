<style>
:root{
  --bg:#12141a;--panel:#1a1d26;--panel2:#222633;--line:#2e3342;
  --txt:#e8eaf0;--muted:#8b92a5;
  --accent:#f26722;--accent2:#ff8a4d;
  --green:#22a06b;--red:#e5484d;--blue:#4d8dff;--yellow:#fbbf24;
  --radius:12px;
  font-size:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh;overflow-x:hidden}
button{font-family:inherit;border:none;cursor:pointer;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:10px 12px;width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);border-color:transparent}
label{font-size:12px;color:var(--muted);display:block;margin:12px 0 5px;font-weight:600;letter-spacing:.03em;text-transform:uppercase}

/* Icoonbalk links (desktop) */
#sideRail{display:none;position:fixed;left:0;top:0;bottom:0;width:54px;background:#14161d;border-right:1px solid var(--line);z-index:45;flex-direction:column;align-items:center;padding:10px 0}
.railAvatar{width:34px;height:34px;border-radius:9px;background:var(--accent);color:#fff;font-weight:900;font-size:17px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;flex:0 0 auto;font-family:Arial,sans-serif}
#sideRail button{width:100%;padding:14px 0;color:#8b92a5;display:flex;justify-content:center;position:relative}
#sideRail button:active{color:#fff}
#sideRail button.on{color:#fff;background:var(--panel2)}
#sideRail button.on::before{content:'';position:absolute;left:0;top:9px;bottom:9px;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.railSpacer{flex:1}
@media (min-width:1000px){
  #sideRail{display:flex}
  body{padding-left:54px}
}

/* Merk */
#brand{display:none;align-items:center;gap:9px;margin:0 6px 0 4px}
.brandIcon{width:28px;height:28px;border-radius:7px;background:#fff;color:var(--accent);font-weight:900;font-size:18px;display:inline-flex;align-items:center;justify-content:center;font-family:Arial,sans-serif}
.brandTxt{color:#fff;font-weight:900;font-size:17px;letter-spacing:.22em}
@media (min-width:1000px){ #brand{display:flex} }
#drawer .head .logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:900;letter-spacing:.2em}
#drawer .head .logo .brandIcon{background:var(--accent);color:#fff}

/* Topbar */
#topbar{background:var(--accent);display:flex;align-items:center;gap:4px;padding:10px 8px;position:sticky;top:0;z-index:40}
#topbar button{padding:10px;border-radius:8px;color:#fff;font-size:20px;line-height:1}
#topbar button:active{background:rgba(255,255,255,.15)}
#dateLabel{flex:1;text-align:center;font-size:19px;font-weight:700;color:#fff}
#dateInput{position:absolute;opacity:0;width:1px;height:1px;pointer-events:none}

#syncDot{display:none;width:9px;height:9px;border-radius:50%;background:#777;margin:0 2px;flex:0 0 auto;align-self:center}

/* Countbar */
#countbar{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);gap:16px}
#countbar .nums{flex:1;font-size:14px;line-height:1.6}
#countbar .nums b{font-size:15px}
#countbar .ic{font-size:20px;padding:9px;border-radius:9px;color:#e2e6f0;display:flex;align-items:center;justify-content:center}
#countbar .ic:active{background:var(--panel2);transform:scale(.94)}
#countbar .ic.actief{color:#fff;background:var(--accent)}
#countbar #btnWisPA{color:#e5484d}
#filterbar{display:flex;gap:10px;align-items:flex-end;padding:10px 16px 14px;border-bottom:1px solid var(--line);flex-wrap:wrap}
#filterbar[hidden]{display:none}
.fltGroup label{margin:0 0 4px;font-size:10.5px}
.fltGroup input,.fltGroup select{padding:7px 9px;font-size:13.5px;width:auto;min-width:86px}
.fltGroup.grow{flex:1;min-width:120px}
.fltGroup.grow select{width:100%}
.fltDash{color:var(--muted);padding-bottom:10px}
.fltReset{padding:8px 12px;border-radius:8px;background:var(--panel2);font-size:12.5px;font-weight:700;color:var(--muted)}

/* View tabs (locaties) */
#locTabs{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;border-bottom:1px solid var(--line)}
#locTabs:empty{display:none}
#locTabs button{white-space:nowrap;padding:8px 14px;border-radius:20px;background:var(--panel2);font-size:13px;font-weight:600;color:var(--muted)}
#locTabs button.on{background:var(--accent);color:#fff}

/* Content */
#content{padding:0 0 140px}
.empty{text-align:center;color:var(--muted);padding:80px 20px;font-size:16px}

.card{background:#15181f;border:none;border-bottom:1px solid #22273a;border-radius:0;padding:12px 14px;margin:0;display:flex;gap:14px;align-items:center;cursor:pointer}
.card:active{background:#1b1f2a}
.cpax{font-size:16px;font-weight:800;min-width:32px;white-space:nowrap}
.cpax small{font-size:10px;color:var(--muted);margin-left:2px;font-weight:600}
.cnaam{font-weight:700;font-size:15px;flex:0 1 200px;min-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmid{flex:1;min-width:0}
.cnote{font-size:12.5px;color:#c6cbd8;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px;color:#16110b;margin-right:6px;white-space:nowrap}
.ctafel{text-align:right;font-weight:800;font-size:14px;min-width:58px;display:flex;flex-direction:column;line-height:1.25}
.ctafel small{font-size:10px;color:var(--muted);font-weight:600}
.stBtn{font-size:9px;font-weight:800;letter-spacing:.05em;padding:9px 6px;border-radius:7px;color:#17120c;min-width:86px;text-align:center}

.vrijRow{display:flex;gap:12px;align-items:center;padding:7px 14px;color:var(--muted);font-size:13px;border-left:3px solid var(--line);margin:0 0 6px 6px}
.vrijRow b{min-width:44px;font-size:14px;color:var(--txt);opacity:.55}

.sectionH{background:#000;color:#fff;font-size:14px;font-weight:800;padding:6px 14px;margin:14px 0 0}
.sectionH:first-child{margin-top:0}
.azLetter{font-size:15px;font-weight:800;color:var(--accent2);margin:16px 14px 6px}

/* FABs */
.fab{position:fixed;right:18px;width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;box-shadow:0 4px 14px rgba(0,0,0,.45);z-index:30}
#fabAdd{bottom:20px;background:var(--accent)}

/* Minikalender datumveld */
.mcalOv{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:95;display:flex;align-items:center;justify-content:center}
.mcalBox{background:#2f3340;border-radius:14px;padding:16px 14px;width:320px;box-shadow:0 10px 40px rgba(0,0,0,.6)}
.mcalHead{display:flex;align-items:center;margin-bottom:12px}
.mcalHead h3{flex:1;text-align:center;color:var(--accent2);font-size:16px}
.mcalHead button{font-size:22px;padding:4px 14px;border-radius:8px}
.mcalHead button:active{background:var(--panel2)}
.mcalGrid{display:grid;grid-template-columns:repeat(7,1fr);row-gap:6px;justify-items:center;align-items:center}
.mcHd{font-size:11px;color:var(--muted);font-weight:700}
.mcDay{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:13.5px;font-weight:700;border-radius:50%;cursor:pointer}
.mcDay:active{background:var(--panel2)}
.mcDay.sel{background:var(--accent);color:#fff}
.mcDay.today{box-shadow:inset 0 0 0 2px var(--accent)}
#fNot{resize:vertical;min-height:88px;line-height:1.45}

/* Touch-apparaten: 16px voorkomt automatisch inzoomen op iOS */
@media (pointer:coarse){
  input,select,textarea,.ddBtn,.tafelPickBtn{font-size:16px}
}
/* Veilige randen (notch/thuisbalk) in beginscherm-modus */
#topbar{padding-top:calc(10px + env(safe-area-inset-top))}
#fabAdd{bottom:calc(20px + env(safe-area-inset-bottom))}
#sideRail{padding-top:calc(10px + env(safe-area-inset-top))}

/* Mobiel: gestapelde rij zoals DISH, tellerbalk compact */
@media (max-width:640px){
  #countbar .nums{font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #countbar .nums b{font-size:13px}
  .card{flex-wrap:wrap;row-gap:5px;column-gap:10px}
  .cpax{order:1}
  .ctafel{order:2;margin-left:auto;flex-direction:row;align-items:baseline;gap:6px;min-width:0}
  .ctafel small{order:-1;font-size:12px}
  .ctafel small::after{content:' -'}
  .cnaam{order:3;flex:1 1 55%;min-width:0}
  .stBtn{order:4;margin-left:auto;min-width:96px}
  .cmid{order:5;flex:1 1 100%}
}

/* Smalle lijst naast de plattegrond: gestapelde rij zoals DISH */
.mapList .card{flex-wrap:wrap;row-gap:5px;column-gap:10px}
.mapList .cpax{order:1}
.mapList .ctafel{order:2;margin-left:auto;flex-direction:row;align-items:baseline;gap:6px;min-width:0}
.mapList .ctafel small{order:-1;font-size:12px}
.mapList .ctafel small::after{content:' -'}
.mapList .cnaam{order:3;flex:1 1 55%;min-width:0}
.mapList .stBtn{order:4;margin-left:auto}
.mapList .cmid{order:5;flex:1 1 100%}

/* Plattegrond splitview */
.mapSplit{display:flex;gap:0;padding:0}
.mapLeft{flex:0 0 340px;display:flex;flex-direction:column;border-right:1px solid var(--line);min-height:76vh}
.mapLocWrap{padding:10px 14px;border-bottom:1px solid var(--line)}
.mapList{flex:1;overflow-y:auto;max-height:76vh}
.mapMain{flex:1;min-width:0;padding:10px 12px 0}
@media (max-width:999px){
  .mapSplit{flex-direction:column}
  .mapLeft{flex:none;border-right:none;min-height:0}
  .mapList{display:none}
}
.mapLocWrap .ddBtn{border-bottom:1px solid #4a5163;padding:8px 0;font-size:14.5px;font-weight:700}
.mapBar input[type="range"]{flex:1;min-width:70px;accent-color:var(--accent);height:4px}
.tijdBox{border:1px solid var(--line);border-radius:8px;padding:8px 11px;font-size:13px;font-weight:800;background:var(--panel)}
.tbl{flex-direction:column;gap:0}
.tbl .tnr2{font-size:13px;font-weight:800;line-height:1.1}
.tbl .tijdje{font-size:8px;font-weight:800;line-height:1.2;letter-spacing:.02em}
.tbl.res{background:var(--accent2);border-color:var(--accent);color:#2b1105}
.tbl.res .chair{background:var(--accent)}
.tbl.res small{color:#ffd9c4;background:none}
.tbl.in{background:#3ecf8e;border-color:var(--green);color:#06281a}
.tbl.in .chair{background:var(--green)}
.tbl.in small{color:#a9f0d3;background:none}

/* DISH-stijl formulier: onderstreepte velden */
#sheet label{text-transform:none;letter-spacing:0;font-size:11.5px;margin:16px 0 1px}
#sheet input,#sheet select,#sheet textarea{background:transparent;border:none;border-bottom:1px solid #4a5163;border-radius:0;padding:7px 0;font-size:15px}
#sheet input:focus,#sheet select:focus,#sheet textarea:focus{outline:none;border-bottom:2px solid var(--accent);padding-bottom:6px}
#sheet input[type="checkbox"]{border:none;padding:0}
#sheet .tafelPickBtn{background:transparent;border:none;border-bottom:1px solid #4a5163;border-radius:0;padding:7px 0;width:100%;text-align:left;font-size:15px}
#sheet .tafelList{background:var(--panel2);border:1px solid var(--line);border-radius:8px}
.topChip{display:flex;justify-content:center;margin:0 0 2px}
.topChip .chip{margin-left:0;font-size:11px;padding:3px 10px}
.overboekt{display:none;color:#e5304d;font-size:11px;margin-top:5px;font-weight:600}
.paxBtn{flex:1;padding:10px 0;border-radius:4px;background:transparent;border:1px solid #cfd3de;font-size:14px;font-weight:700;color:var(--txt)}
.paxBtn.on{background:#fff;border-color:#fff;color:#14161d}
.shSave{font-size:20px;padding:8px 22px;border-radius:8px;background:#3a3f4d;color:#8b92a5;font-weight:800;transition:background .15s}
.shSave.actief{background:var(--green);color:#fff}

.ddBtn{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:transparent;border:none;border-bottom:1px solid #4a5163;padding:7px 0;font-size:15px;color:var(--txt)}
.ddBtn .ddArr{color:var(--muted);font-size:12px;margin-left:6px}
.ddBtn span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.tafelPop{position:fixed;width:280px;max-height:64vh;overflow-y:auto;background:#262a35;border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 34px rgba(0,0,0,.55)}
.tafelPop label.tRow{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--line);font-size:14px;margin:0;text-transform:none;letter-spacing:0;color:var(--txt);font-weight:600}
.tafelPop label.tRow:last-child{border-bottom:none}
.tafelPop label.tRow.conflict b, .tafelPop label.tRow.conflict span{color:#e5304d}
.tafelPop label.tRow.conflict input{accent-color:#e5304d}
.tafelPop input[type="checkbox"]{width:18px;height:18px;accent-color:var(--accent);border:none;padding:0}

/* Ticket scanner */
#btnScan{padding:9px;border-radius:8px;color:#fff;display:flex;align-items:center}
#btnScan:active{background:rgba(255,255,255,.15)}
.scanOv{position:fixed;inset:0;background:#0c0e13;z-index:65;display:flex;flex-direction:column}
.scanTop{display:flex;align-items:center;gap:10px;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;background:var(--accent)}
.scanTop h2{flex:1;text-align:center;color:#fff;font-size:17px}
.scanVid{position:relative;flex:1;min-height:0;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}
.scanVid video{width:100%;height:100%;object-fit:cover}
.scanKader{position:absolute;width:min(62vw,320px);aspect-ratio:1;border:3px solid rgba(255,255,255,.85);border-radius:18px;box-shadow:0 0 0 2000px rgba(0,0,0,.35)}
.scanRes{padding:16px 16px calc(20px + env(safe-area-inset-bottom));background:var(--panel);text-align:center;font-size:14.5px;max-height:46vh;overflow-y:auto}
.scanGeen{font-weight:700;color:#e5484d;margin-bottom:6px}
.scanHit{text-align:left;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px}
.scanNaam{font-size:17px;font-weight:800}
.scanNaam .chip{margin-left:8px;vertical-align:2px}
.scanTafel{font-size:14px;color:#c6cbd8;margin:7px 0 4px}
.scanTafel b{color:#fff;font-size:16px}
.btn.green{background:var(--green);color:#fff}

.kopRij{display:flex;flex-direction:column;gap:2px;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:7px}
.kopRij:active{background:#2a2f3d}
.kopRij b{font-size:15px}
.kopRij span{font-size:12px;color:var(--muted)}
#kopLijst{max-height:32vh;overflow-y:auto}

/* Statusmenu */
.stOv{position:fixed;inset:0;z-index:96}
.stMenu{position:fixed;width:230px;max-height:64vh;overflow-y:auto;background:#262a35;border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 34px rgba(0,0,0,.55)}
.stMenu button{display:flex;align-items:center;width:100%;padding:12px 16px;font-size:14px;font-weight:600;border-bottom:1px solid var(--line);text-align:left}
.stMenu button:last-child{border-bottom:none}
.stMenu button.on{background:var(--panel2)}
.stMenu button:active{background:var(--panel2)}
.stMenu button i{margin-left:auto;width:11px;height:11px;border-radius:50%}

.vraagBox{background:#2b2f3b;border-radius:14px;padding:20px 18px;width:300px;box-shadow:0 10px 40px rgba(0,0,0,.6)}
.vraagBox p{font-size:14.5px;line-height:1.5;margin-bottom:14px}

/* Klok tijdkiezer */
.clockOv{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:95;display:flex;align-items:center;justify-content:center}
.clockBox{background:#2b2f3b;border-radius:16px;overflow:hidden;width:308px;box-shadow:0 10px 40px rgba(0,0,0,.6)}
.clockHead{background:var(--accent);color:#fff;font-size:46px;font-weight:300;text-align:center;padding:12px;letter-spacing:1px}
.clockHead span{opacity:.55;cursor:pointer}
.clockHead span.on{opacity:1;font-weight:600}
.clockDial{position:relative;width:264px;height:264px;border-radius:50%;background:#3a3f4d;margin:20px auto 14px;touch-action:none}
.ckNum{position:absolute;width:36px;height:36px;margin:-18px 0 0 -18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13.5px;font-weight:600;color:var(--txt);background:none;z-index:2;pointer-events:none}
.ckNum.inner{font-size:12px;color:var(--muted)}
.ckNum.on{background:var(--accent);color:#fff}
.ckHand{position:absolute;left:50%;top:50%;height:2px;background:var(--accent);transform-origin:left center;z-index:1}
.ckDot{position:absolute;left:50%;top:50%;width:8px;height:8px;margin:-4px 0 0 -4px;border-radius:50%;background:var(--accent);z-index:1}
.clockBtns{display:flex;gap:10px;padding:0 16px 16px}

/* Kalender */
#calScrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:55;opacity:0;pointer-events:none;transition:opacity .2s}
#calScrim.open{opacity:1;pointer-events:auto}
#calPanel{position:fixed;top:0;right:0;bottom:0;width:86%;max-width:310px;background:var(--panel);border-left:1px solid var(--line);z-index:60;transform:translateX(102%);transition:transform .22s;overflow-y:auto;padding:16px 14px}
#calPanel.open{transform:none}
.calNav{display:flex;gap:10px;align-items:center;margin-bottom:16px}
.calNav button{padding:9px 12px;border-radius:8px;font-size:18px}
.calNav button:active{background:var(--panel2)}
#calToday{flex:1;border:1px solid var(--txt);font-size:12px;font-weight:800;letter-spacing:.1em}
.calMonth{margin-bottom:26px}
.calMonth h3{text-align:center;font-size:16px;margin-bottom:12px}
.calGrid{display:grid;grid-template-columns:repeat(7,1fr);row-gap:4px;text-align:center;align-items:center;justify-items:center}
.calHd{font-size:11px;color:var(--muted);font-weight:700;padding:2px 0}
.calDay{position:relative;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:13.5px;font-weight:700;border-radius:50%;cursor:pointer}
.calDay:active{background:var(--panel2)}
.calDay.mut{color:#565d70}
.calDay.today{background:var(--blue);color:#fff}
.calDay.sel{box-shadow:inset 0 0 0 2px var(--txt)}
.calDay .d{position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--blue)}

/* Drawer */
#scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;opacity:0;pointer-events:none;transition:opacity .2s}
#scrim.open{opacity:1;pointer-events:auto}
#drawer{position:fixed;top:0;left:0;bottom:0;width:78%;max-width:320px;background:var(--panel);z-index:60;transform:translateX(-102%);transition:transform .22s;display:flex;flex-direction:column;border-right:1px solid var(--line)}
#drawer.open{transform:none}
#drawer .head{padding:22px 20px 16px;border-bottom:1px solid var(--line)}
#drawer .head .logo{font-size:21px;font-weight:900;letter-spacing:.12em}
#drawer .head .logo span{color:var(--accent)}
#drawer .head .who{font-size:12px;color:var(--muted);margin-top:4px}
#drawer nav{flex:1;overflow-y:auto;padding:8px 0}
#drawer nav button{display:flex;align-items:center;gap:14px;width:100%;padding:15px 20px;font-size:15.5px;font-weight:600;text-align:left}
#drawer nav button .mi{width:24px;text-align:center;font-size:18px}
#drawer nav button.on{background:var(--panel2);color:var(--accent2)}
#drawer nav hr{border:none;border-top:1px solid var(--line);margin:6px 0}

/* Sheet (formulier) */
#sheetWrap{position:fixed;inset:0;z-index:70;display:none}
#sheetWrap.open{display:block}
#sheetWrap .bg{position:absolute;inset:0;background:rgba(0,0,0,.6)}
#sheet{position:absolute;left:0;right:0;bottom:0;background:var(--panel);border-radius:18px 18px 0 0;padding:16px 18px 24px;max-height:88vh;overflow-y:auto}
@media (min-width:700px){
  #sheet{left:auto;top:0;right:0;bottom:0;width:420px;max-height:none;border-radius:0;border-left:1px solid var(--line)}
}
.tafelPickBtn{width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:11px 12px;font-size:15px}
.tafelList{max-height:230px;overflow-y:auto;border:1px solid var(--line);border-radius:8px;margin-top:6px;background:var(--panel2)}
.tafelList label.tRow{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--line);font-size:14px;margin:0;text-transform:none;letter-spacing:0;color:var(--txt);font-weight:600}
.tafelList label.tRow:last-child{border-bottom:none}
.tRow b{min-width:36px;font-size:15px}
.tRow span{margin-left:auto;color:var(--muted);font-size:12px;font-weight:500}
.tafelList label.tRow.conflict b, .tafelList label.tRow.conflict span{color:#e5304d}
.tafelList label.tRow.conflict input{accent-color:#e5304d}
input[type="checkbox"]{width:18px;height:18px;accent-color:var(--accent)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
.formFoot{margin-top:22px;border-top:1px solid var(--line);padding-top:16px}
.formFoot .btn{display:block;width:100%;margin-top:10px;padding:10px;font-size:11.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;border-radius:5px;background:transparent}
.formFoot #fCopy{border:1px solid #cfd3de;color:var(--txt)}
.formFoot #fCopy:active{background:rgba(255,255,255,.08)}
.formFoot #fAnnul{border:1px solid #e5304d;color:#e5304d}
.formFoot #fAnnul:active{background:rgba(229,48,77,.12)}
.formFoot #fDel{border:1px solid #e5304d;color:#e5304d}
.formFoot #fDel:active{background:rgba(229,48,77,.12)}
.fMeta{text-align:center;font-size:11.5px;color:var(--muted);margin-top:12px}
.sheetHead{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.sheetHead h2{flex:1;text-align:center;font-size:17px}
.shBack{font-size:26px;padding:4px 14px;border-radius:8px;background:var(--panel2)}
.paxRow{display:flex;gap:8px}
.card.st-no{opacity:.55}
.card.st-no .tnr{box-shadow:inset 0 0 0 2px var(--red)}
.tlBlock.no{background:#3a3f4e;border-left-color:var(--red);color:#aab;opacity:.7}
.tbl.no{border-color:var(--red);opacity:.6}
#sheet h2{font-size:17px;margin-bottom:4px}
.row2{display:flex;gap:10px}
.row2>div{flex:1}
.sheetBtns{display:flex;gap:10px;margin-top:20px}
.btn{flex:1;padding:13px;border-radius:10px;font-size:15px;font-weight:700;text-align:center}
.btn.primary{background:var(--accent);color:#fff}
.btn.ghost{background:var(--panel2)}
.btn.danger{background:transparent;color:var(--red);flex:0 0 auto;padding:13px 16px}
.btn.green{background:var(--green);color:#fff}

/* Tijdlijn */
.tlScroll{overflow-x:auto;margin:0;padding:0 0 8px;-webkit-overflow-scrolling:touch}
.tlHead{display:flex;position:sticky;top:0;background:var(--bg);z-index:5}
.tlHours{position:relative;height:34px;flex:0 0 auto}
.tlHour{position:absolute;top:8px;font-size:13px;font-weight:700;color:var(--muted);transform:translateX(-50%)}
.tlLoc{display:none}
.tlLocRow{position:sticky;left:0;padding:16px 6px 8px;font-size:14px;font-weight:800;width:max-content}
.tlRow{display:flex;border-top:1px solid var(--line)}
.tlLabel{flex:0 0 62px;min-height:46px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;background:var(--bg);border-right:1px solid var(--line);position:sticky;left:0;z-index:3;gap:2px}
.tlLabel sup{font-size:10px;color:var(--muted);font-weight:700;margin-top:-8px}
.tlTrack{position:relative;flex:0 0 auto;min-height:46px}
.tlGrid{position:absolute;top:0;bottom:0;width:1px;background:var(--line);opacity:.7}
.tlGrid.q{opacity:.22}
.tlNow{position:absolute;top:0;bottom:0;width:2px;background:#e5304d;z-index:2;pointer-events:none}
.tlNowDot{position:absolute;top:2px;width:10px;height:10px;border-radius:50%;background:#e5304d;transform:translateX(-50%)}
.tlBlock{position:absolute;top:4px;bottom:4px;background:var(--accent2);border-left:8px solid var(--accent);border-radius:6px;color:#1a0d05;display:flex;align-items:center;gap:7px;padding:0 8px;overflow:hidden;white-space:nowrap;font-size:13.5px;cursor:pointer}
.tlBlock.in{background:#3ecf8e;border-left-color:var(--green);color:#06281a}
.tlBlock b{font-size:15px}
.tlNaam{font-weight:700;overflow:hidden;text-overflow:ellipsis}
.tlTag{font-size:10px;font-weight:800;padding:2px 6px;border-radius:5px;background:rgba(0,0,0,.25);color:#fff}
.tlTag.Luxe{background:#b48a10}
.tlTag.Kind{background:#2a63c9}
.tlTag.Koffie{background:#6b4226}
.tlNote{font-size:11.5px;opacity:.75;overflow:hidden;text-overflow:ellipsis}

/* Plattegrond */
#mapWrap{position:relative;height:74vh;overflow:auto;-webkit-overflow-scrolling:touch}
#mapWrap.editMode{outline:2px dashed var(--accent);border-radius:8px}
#mapSizer{position:relative;overflow:hidden}
#mapCanvas{position:relative}
#mapCanvas.editGrid{background:
  linear-gradient(var(--line) 1px, transparent 1px),
  linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size:50px 50px;background-position:-1px -1px}
.tbl{position:absolute;width:56px;height:56px;border-radius:10px;background:var(--panel2);border:2px solid #8b92a5;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;user-select:none;touch-action:none;transform:translate(-50%,-50%)}
.tbl.round{border-radius:50%}
.tbl.wide{width:86px}
.chair{position:absolute;width:15px;height:5px;background:#4a5164;border-radius:3px;pointer-events:none}
.tbl small{position:absolute;bottom:-24px;font-size:9px;color:var(--muted);font-weight:600;white-space:nowrap;background:var(--bg);padding:0 3px;border-radius:3px}
.mapBar{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.mapBar .btn{flex:0 0 auto;padding:9px 14px;font-size:13px}
.legend{display:flex;gap:14px;font-size:11.5px;color:var(--muted);margin-top:10px}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}

/* Instellingen */
.setCard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.setCard h3{font-size:14px;margin-bottom:4px}
.setCard p{font-size:12px;color:var(--muted)}

.toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--line);padding:11px 18px;border-radius:10px;font-size:14px;font-weight:600;z-index:90;box-shadow:0 4px 14px rgba(0,0,0,.5)}
</style>
</head>

function parseTafels(rangeStr){
  // Ondersteunt: "201", "201:4", "201-204", "201-204:4". Volgorde blijft zoals ingevoerd.
  const out = [];
  (rangeStr||'').split(',').forEach(part=>{
    part = part.trim(); if(!part) return;
    let cap = null;
    const cm = part.match(/^(.*?):(\d+)$/);
    if(cm){ part = cm[1].trim(); cap = +cm[2]; }
    const m = part.match(/^(\d+)\s*-\s*(\d+)$/);
    if(m){ for(let i=+m[1]; i<=+m[2]; i++) out.push({nr:String(i), cap}); }
    else if(part) out.push({nr:part, cap});
  });
  return out;
}

function openCal(){
  const d = new Date(curDate+'T12:00:00');

  calPanel.classList.add('open'); calScrim.classList.add('open');
}
function closeCal(){ calPanel.classList.remove('open'); calScrim.classList.remove('open'); }
function renderCal(){
  const dots = resDatesSet();
  const today = todayStr();
  let html = '';
  for(let i=0;i<3;i++){
    const y = calStart.y + Math.floor((calStart.m+i)/12);
    const m = (calStart.m+i)%12;
    const first = new Date(y,m,1);
    let naam = first.toLocaleDateString('nl-NL',{month:'long',year:'numeric'});
    naam = naam.charAt(0).toUpperCase()+naam.slice(1);
    const dagen = new Date(y,m+1,0).getDate();
    const offset = (first.getDay()+6)%7; // maandag eerst
    html += `<div class="calMonth"><h3>${naam}</h3><div class="calGrid">`;
    ['M','D','W','D','V','Z','Z'].forEach(h=>html+=`<span class="calHd">${h}</span>`);
    for(let b=0;b<offset;b++) html += '<span></span>';
    for(let dag=1;dag<=dagen;dag++){
      const iso = y+'-'+String(m+1).padStart(2,'0')+'-'+String(dag).padStart(2,'0');
      const cls = ['calDay'];
      if(iso < today) cls.push('mut');
      if(iso === today) cls.push('today');
      if(iso === curDate && iso !== today) cls.push('sel');
      html += `<span class="${cls.join(' ')}" data-d="${iso}">${dag}${dots.has(iso)?'<i class="d"></i>':''}</span>`;
    }
    html += '</div></div>';
  }
  calMonths.innerHTML = html;
  calMonths.querySelectorAll('.calDay').forEach(el=>{
    el.onclick = ()=>{ curDate = el.dataset.d; closeCal(); render(); };
  });
}

function parseFirebaseConfig(txt){

  if(!m) return null;
  let t = m[0]
    .replace(/([,{]\s*)([A-Za-z0-9_]+)\s*:/g, '$1"$2":')
    .replace(/'/g, '"')
    .replace(/,\s*\}/g, '}');
  try{ const o = JSON.parse(t); return o.apiKey ? o : null; }catch(e){ return null; }
}

function startSync(){
  const cfg = store.get('ct_sync', SYNC_STANDAARD);
  if(!cfg || !cfg.config) return;
  syncStatus('#fbbf24');
  const laden = src => new Promise((res,rej)=>{
    const el = document.createElement('script');
    el.src = src; el.onload = res; el.onerror = rej;
    document.head.appendChild(el);
  });
  Promise.resolve()
    .then(()=> window.firebase ? null : laden('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js'))
    .then(()=> (window.firebase && firebase.database) ? null : laden('https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js'))
    .then(()=>{
      if(!firebase.apps.length) firebase.initializeApp(cfg.config);
      db = firebase.database();
      syncPad = 'ct_' + (cfg.sleutel || 'team').replace(/[^A-Za-z0-9_-]/g,'');
      return db.ref(syncPad + '/res').once('value');
    })
    .then(snap=>{
      const alles = snap.val() || {};
      Object.entries(alles).forEach(([datum, obj])=>{
        store.set('ct_res_'+datum, Object.values(obj||{}));
      });
      db.ref(syncPad + '/layout').on('value', sn=>{
        const v = sn.val();
        if(v){ layout = v; store.set('ct_layout', layout); if(curView==='map' && !editMode) render(); }
      });
      db.ref('.info/connected').on('value', sn=> syncStatus(sn.val() ? '#22c08a' : '#e5304d'));
      syncSubDatum = null;
      render();
    })
    .catch(e=>{ console.error('Sync', e); syncStatus('#e5304d'); toast('Sync verbinden mislukt'); });
}

/* ============ TICKET SCANNER ============ */
let scanStream = null, scanRAF = null;

function openScanner(){
  const ov = document.createElement('div');
  ov.className = 'scanOv';
  ov.innerHTML = `
    <div class="scanTop"><button class="shBack" id="scanX">&#8249;</button><h2>Ticket scannen</h2><span style="width:52px"></span></div>
    <div class="scanVid"><video id="scanVideo" playsinline muted></video><div class="scanKader"></div></div>
    <div class="scanRes" id="scanRes">Richt de camera op de QR-code van het ticket</div>`;
  document.body.appendChild(ov);
  const stop = ()=>{
    if(scanRAF) cancelAnimationFrame(scanRAF);
    if(scanStream){ scanStream.getTracks().forEach(t=>t.stop()); scanStream = null; }
    ov.remove();
  };
  ov.querySelector('#scanX').onclick = stop;

  const laad = window.jsQR ? Promise.resolve() : new Promise((res,rej)=>{
    const el = document.createElement('script');
    el.src = 'https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js';
    el.onload = res; el.onerror = rej;
    document.head.appendChild(el);
  });
  laad
    .then(()=> navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' }, audio:false }))
    .then(stream=>{
      scanStream = stream;
      const video = ov.querySelector('#scanVideo');
      video.srcObject = stream;
      video.play();
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d', { willReadFrequently:true });
      let laatste = '', pauzeTot = 0;
      const loop = ()=>{
        scanRAF = requestAnimationFrame(loop);
        if(video.readyState < 2 || Date.now() < pauzeTot) return;
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        if(!canvas.width) return;
        ctx.drawImage(video, 0, 0);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = window.jsQR(img.data, img.width, img.height, { inversionAttempts:'dontInvert' });
        if(code && code.data){
          if(code.data === laatste && Date.now() < pauzeTot + 4000) return;
          laatste = code.data;
          pauzeTot = Date.now() + 2000;
          if(navigator.vibrate) navigator.vibrate(60);
          toonScanResultaat(ov, code.data);
        }
      };
      loop();
    })
    .catch(()=>{
      ov.querySelector('#scanRes').innerHTML = '<div class="scanGeen">Camera niet beschikbaar</div><small style="color:var(--muted)">Sta cameratoegang toe in de browserinstellingen.</small>';
    });
}

// Matcht ook op naam: sommige tickets hebben de gastnaam in de QR staan
function naamInTekst(r, tekstLower){
  const delen = r.naam.toLowerCase().split(/[,\s-]+/).filter(w => w.length >= 4);
  return delen.length > 0 && delen.some(w => tekstLower.includes(w));
}

function toonScanResultaat(ov, tekst){
  const box = ov.querySelector('#scanRes');
  const all = getRes();
  window._scanTekst = String(tekst);
  const tekstLower = String(tekst).toLowerCase();
  // Alle langere cijferreeksen uit de QR halen + de hele tekst zelf
  const nummers = (String(tekst).match(/\d{5,}/g) || []).concat(String(tekst).trim());
  const matches = all.filter(r =>
    (r.orders||[]).some(o => nummers.includes(String(o))) || naamInTekst(r, tekstLower)
  );
  if(!matches.length){
    box.innerHTML = `<div class="scanGeen">Geen reservering gevonden voor deze code</div>
      <small style="color:var(--muted);word-break:break-all">${esc(String(tekst).slice(0,140))}</small>
      <div class="sheetBtns" style="margin-top:12px"><button class="btn primary" onclick="koppelScan()">Koppelen aan een gast</button></div>`;
    return;
  }
  box.innerHTML = matches.map(r=>{
    const tfs = getTafels(r);
    return `<div class="scanHit">
      <div class="scanNaam">${esc(r.naam)}<span class="chip" style="background:${arrKleur(r.arr)}">${esc(r.arr)}</span></div>
      <div class="scanTafel">${esc(r.loc)} &middot; tafel <b>${tfs.length ? tfs.map(esc).join(', ') : 'nog niet toegewezen'}</b> &middot; ${r.pax} pers. &middot; ${esc(r.tijd)}</div>
      <div class="sheetBtns">
        <button class="btn ghost" onclick="openFormById('${r.id}')">Details</button>
        <button class="btn green" onclick="scanAanTafel('${r.id}', this)">${r.status==='in' ? '\u2713 Zit aan tafel' : 'Aan tafel zetten'}</button>
      </div>
    </div>`;
  }).join('');

  // Eenduidige treffer: meteen openen zodat drankjes ingevoerd kunnen worden
  if(matches.length === 1){
    openFormById(matches[0].id);
  }
}

window.scanAanTafel = (id, btn)=>{
  const list = getRes();
  const r = list.find(x=>x.id===id); if(!r) return;
  r.status = 'in'; r.bewerkt = Date.now();
  syncSetRes(curDate, r);
  setRes(list);
  if(btn) btn.textContent = '\u2713 Zit aan tafel';
};

window.koppelScan = ()=>{
  const box = document.querySelector('.scanOv #scanRes');
  if(!box) return;
  const all = getRes().slice().sort((a,b)=>a.naam.localeCompare(b.naam,'nl',{sensitivity:'base'}));
  box.innerHTML = `<div style="text-align:left">
    <b>Koppel deze code aan een gast</b>
    <input id="kopZoek" placeholder="Zoek op naam..." autocomplete="off" style="margin:10px 0;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:11px;width:100%;font-size:16px">
    <div id="kopLijst"></div>
  </div>`;
  const lijst = box.querySelector('#kopLijst');
  const teken = (f)=>{
    lijst.innerHTML = all
      .filter(r => !f || r.naam.toLowerCase().includes(f))
      .map(r => {
        const tfs = getTafels(r);
        return `<button class="kopRij" onclick="koppelAan('${r.id}')"><b>${esc(r.naam)}</b><span>${esc(r.loc)} &middot; ${tfs.length?tfs.map(esc).join(', '):'geen tafel'} &middot; ${r.pax}p</span></button>`;
      }).join('') || '<div style="padding:14px;color:var(--muted)">Geen gasten gevonden</div>';
  };
  teken('');
  box.querySelector('#kopZoek').oninput = e => teken(e.target.value.toLowerCase().trim());
};

window.koppelAan = (id)=>{
  const list = getRes();
  const r = list.find(x=>x.id===id); if(!r) return;
  const tekst = window._scanTekst || '';
  const nrs = (tekst.match(/\d{5,}/g) || [tekst.trim()]).filter(Boolean).map(String);
  if(!nrs.length){ toast('Geen bruikbare code'); return; }
  r.orders = [...new Set([...(r.orders||[]), ...nrs])];
  r.bewerkt = Date.now();
  syncSetRes(curDate, r);
  setRes(list);
  toast('Code gekoppeld aan '+r.naam);
  const ov = document.querySelector('.scanOv');
  if(ov) toonScanResultaat(ov, tekst);
};

/* ============ PA IMPORT (vanuit PA Manager) ============ */
// Formaat: { datum:'2026-07-04', reserveringen:[{naam, pax, tijd, duur, loc, tafels:['201','202'], arr, notitie, status}] }
window.ctImport = function(data){
  try{
    if(typeof data === 'string') data = JSON.parse(data);
    const datum = data.datum || todayStr();
    const lijst = data.reserveringen || (Array.isArray(data) ? data : []);
    if(!lijst.length){ toast('Geen reserveringen gevonden'); return; }
    const key = 'ct_res_'+datum;
    const bestaand = store.get(key, []);
    const arrMap = {'Koffie':'Koffie arrangement', 'Naborrel':'Na Borrel', 'NaBorrel':'Na Borrel'};
    let nieuw = 0, bijgewerkt = 0;
    lijst.forEach(x=>{
      const tafels = (x.tafels || (x.tafel ? [x.tafel] : []))
        .flatMap(t => String(t).split(/[+,;\s]+/))
        .map(t => t.trim()).filter(Boolean);
      let arr = arrMap[x.arr] || x.arr || arrMap[x.label] || x.label || 'Normaal';
      if(!ARRS.some(o=>o.n===arr)) arr = 'Normaal';
      const r = {
        id: null,
        naam: String(x.naam || 'Onbekend'),
        pax: Math.max(1, +x.pax || +x.personen || 1),
        tijd: x.tijd || '19:30',
        duur: Math.min(720, Math.max(15, +x.duur || 90)),
        loc: LOCS.includes(x.loc) ? x.loc : (LOCS.includes(x.zaal) ? x.zaal : LOCS[0]),
        tafels, tafel: tafels[0] || '',
        arr,
        orders: Array.isArray(x.orders) ? x.orders.map(String) : [],
        notitie: String(x.notitie || ''),
        status: STATUS[x.status] ? x.status : 'res',
        walkin: false, bron: 'pa',
        aangemaakt: Date.now(), bewerkt: Date.now()
      };
      // Herimport van dezelfde gast op dezelfde dag werkt bij, geen dubbelen
      const sleutel = (r.naam+'|'+r.tijd+'|'+r.loc).toLowerCase();
      const i = bestaand.findIndex(b => b.bron==='pa' && (b.naam+'|'+b.tijd+'|'+b.loc).toLowerCase() === sleutel);
      if(i >= 0){
        r.id = bestaand[i].id;
        r.aangemaakt = bestaand[i].aangemaakt || r.aangemaakt;
        r.status = bestaand[i].status;  // handmatig gezette status behouden
        bestaand[i] = r; bijgewerkt++;
      } else {
        r.id = Date.now()+''+Math.floor(Math.random()*99999);
        bestaand.push(r); nieuw++;
      }
    });
    store.set(key, bestaand);
    if(db) bestaand.forEach(r=>{ if(r.bron==='pa') syncSetRes(datum, r); });
    curDate = datum;
    render();
    toast('PA import: '+nieuw+' nieuw, '+bijgewerkt+' bijgewerkt');
    return {nieuw, bijgewerkt};
  }catch(e){
    console.error(e);
    toast('Import mislukt: controleer het formaat');
  }
};

function minNaarTijd(min){
  min = ((min%1440)+1440)%1440;
  return String(Math.floor(min/60)).padStart(2,'0')+':'+String(min%60).padStart(2,'0');
}

    </div>
    ${(existing&&existing.id)?`
    <div class="formFoot">
      <button type="button" class="btn ghost wide" id="fCopy">Reservering kopi\u00ebren</button>
      <button type="button" class="btn annul wide" id="fAnnul">Reservering annuleren</button>
      <button type="button" class="btn danger wide" id="fDel">Definitief verwijderen</button>
      ${r.aangemaakt?`<div class="fMeta">Gemaakt op ${fmtStamp(r.aangemaakt)}${r.bewerkt?' &middot; laatst bewerkt '+fmtStamp(r.bewerkt):''}</div>`:''}

  sheetWrap.classList.add('open');

      meerBtn.textContent = 'MEER';

      paxInput.dispatchEvent(new Event('change'));
    };
  });

  const tafelBtn = sheet.querySelector('#fTafelBtn');
  const locSel = sheet.querySelector('#fLoc');
  function resVoorDatum(){
    const d = (sheet.querySelector('#fDatum')||{}).dataset ? sheet.querySelector('#fDatum').dataset.iso : curDate;
    return (d && d!==curDate) ? store.get('ct_res_'+d, []) : getRes();
  }
  // Tafels die in het gekozen tijdslot al bezet zijn
  function conflictSet(){
    const b = tijdNaarMin(sheet.querySelector('#fTijd').value);
    let e2 = tijdNaarMin(sheet.querySelector('#fEind').value);
    if(e2 <= b) e2 += 1440;
    const set = new Set();
    resVoorDatum().forEach(x=>{
      if(existing && existing.id && x.id===existing.id) return;
      if(x.loc !== locSel.value) return;
      if(INACTIVE.has(x.status)) return;
      const xs = tijdNaarMin(x.tijd), xe = xs+(x.duur||90);
      if(xs < e2 && xe > b) getTafels(x).forEach(nr=>set.add(nr));
    });
    return set;

    const dubbel = [...selTafels].some(nr=>conf.has(nr));

        cb.checked ? selTafels.add(cb.value) : selTafels.delete(cb.value);
        auto.checked = selTafels.size===0;
        updateTafelBtn();
      };
    });
    ov.onclick = (e)=>{ if(e.target===ov) ov.remove(); };
  }
  tafelBtn.onclick = openTafelPop;

  maakDropdown(sheet.querySelector('#fStatus'));

    updateTafelBtn();
  };
  eindInp.onchange = ()=>{ updateTafelBtn(); };
  datumInp.onchange = ()=>{ updateTafelBtn(); };

  sheet.querySelector('#fSave').onclick = ()=>{
    const naam = sheet.querySelector('#fNaam').value.trim();
    if(!naam){ toast('Vul een naam in'); return; }
    let duur = tijdNaarMin(eindInp.value) - tijdNaarMin(tijdInp.value);
    if(duur <= 0) duur += 1440;
    const tfs = [...selTafels];
    const conf = conflictSet();
    const dubbel = tfs.filter(nr=>conf.has(nr));
    const doorgaan = ()=>{
    const nieuw = {
      id: (existing && existing.id) ? existing.id : Date.now()+''+Math.floor(Math.random()*999),
      naam,
      pax: Math.max(1, +paxInput.value || 1),
      tijd: tijdInp.value || '19:30',
      duur: Math.min(720, Math.max(15, duur)),
      loc: locSel.value,
      tafels: tfs,
      tafel: tfs[0]||'',
      arr: sheet.querySelector('#fArr').value,
      notitie: sheet.querySelector('#fNot').value.trim(),
      status: sheet.querySelector('#fStatus').value,
      walkin: r.walkin,
      aangemaakt: (existing && existing.aangemaakt) || Date.now(),
      bewerkt: Date.now()
    };
    const list = getRes();
    const idx = (existing && existing.id) ? list.findIndex(x=>x.id===existing.id) : -1;
    const datum = sheet.querySelector('#fDatum').dataset.iso || curDate;
    if(datum === curDate){
      if(idx>=0) list[idx] = nieuw; else list.push(nieuw);
      setRes(list); closeSheet();
      syncSetRes(curDate, nieuw);
    } else {
      // Verplaatst naar een andere dag
      if(idx>=0){ list.splice(idx,1); store.set(dayKey(), list); syncDelRes(curDate, nieuw.id); }
      const key = 'ct_res_'+datum;
      const doel = store.get(key, []);
      const di = doel.findIndex(x=>x.id===nieuw.id);
      if(di>=0) doel[di] = nieuw; else doel.push(nieuw);
      store.set(key, doel);
      syncSetRes(datum, nieuw);
      curDate = datum;
      closeSheet(); render();
      toast('Opgeslagen op '+fmtDate(datum));
    }
    };
    if(dubbel.length) vraag('Tafel '+dubbel.join(', ')+' is al bezet in dit tijdslot. Toch opslaan?', doorgaan);
    else doorgaan();
  };
  const del = sheet.querySelector('#fDel');
  if(del) del.onclick = ()=>{
    vraag('Reservering definitief verwijderen?', ()=>{
      setRes(getRes().filter(x=>x.id!==existing.id)); closeSheet();
      syncDelRes(curDate, existing.id);
    });
  };
  const annul = sheet.querySelector('#fAnnul');
  if(annul) annul.onclick = ()=>{
    const list = getRes();
    const rr = list.find(x=>x.id===existing.id);
    if(rr){ rr.status = 'ann'; rr.bewerkt = Date.now(); syncSetRes(curDate, rr); }
    setRes(list); closeSheet();

/* ============ MINIKALENDER (datumveld) ============ */
function fmtStamp(ts){
  const d = new Date(ts);
  const iso = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const tijd = String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  return (iso===todayStr() ? 'vandaag' : d.toLocaleDateString('nl-NL',{day:'numeric',month:'short'}))+', '+tijd;
}
function fmtLang(iso){
  let s = new Date(iso+'T12:00:00').toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'});
  return s.charAt(0).toUpperCase()+s.slice(1);
}
function openMiniCal(input){
  let sel = input.dataset.iso || todayStr();
  let d = new Date(sel+'T12:00:00');
  let y = d.getFullYear(), m = d.getMonth();
  const today = todayStr();
  const ov = document.createElement('div');
  ov.className = 'mcalOv';
  ov.innerHTML = '<div class="mcalBox"><div class="mcalHead"><button id="mcPrev">&#8249;</button><h3 id="mcTitle"></h3><button id="mcNext">&#8250;</button></div><div class="mcalGrid" id="mcGrid"></div></div>';
  document.body.appendChild(ov);
  verankerBijVeld(ov, ov.querySelector('.mcalBox'), input);
  function draw(){
    const first = new Date(y,m,1);
    let naam = first.toLocaleDateString('nl-NL',{month:'long',year:'numeric'});
    ov.querySelector('#mcTitle').textContent = naam.charAt(0).toUpperCase()+naam.slice(1);
    const dagen = new Date(y,m+1,0).getDate();
    const offset = (first.getDay()+6)%7;
    let html = '';
    ['M','D','W','D','V','Z','Z'].forEach(h=>html+=`<span class="mcHd">${h}</span>`);
    for(let b=0;b<offset;b++) html += '<span></span>';
    for(let dag=1;dag<=dagen;dag++){
      const iso = y+'-'+String(m+1).padStart(2,'0')+'-'+String(dag).padStart(2,'0');
      const cls = ['mcDay'];
      if(iso===sel) cls.push('sel');
      else if(iso===today) cls.push('today');
      html += `<span class="${cls.join(' ')}" data-d="${iso}">${dag}</span>`;
    }
    const grid = ov.querySelector('#mcGrid');
    grid.innerHTML = html;
    grid.querySelectorAll('.mcDay').forEach(el=>{
      el.onclick = ()=>{
        input.dataset.iso = el.dataset.d;
        input.value = fmtLang(el.dataset.d);
        ov.remove();
        input.dispatchEvent(new Event('change'));
      };
    });
  }
  ov.querySelector('#mcPrev').onclick = ()=>{ m--; if(m<0){m=11;y--;} draw(); };
  ov.querySelector('#mcNext').onclick = ()=>{ m++; if(m>11){m=0;y++;} draw(); };
  ov.onclick = (e)=>{ if(e.target===ov) ov.remove(); };
  draw();
}

/* ============ KLOK TIJDKIEZER ============ */
function openClock(input){
  let [h,m] = (input.value||'19:30').split(':').map(n=>+n||0);
  m = Math.round(m/5)*5 % 60;
  let mode = 'h';
  const pad = n=>String(n).padStart(2,'0');
  const ov = document.createElement('div');
  ov.className = 'clockOv';
  ov.innerHTML = `
    <div class="clockBox">
      <div class="clockHead"><span id="ckH"></span>:<span id="ckM"></span></div>
      <div class="clockDial" id="ckDial"></div>
      <div class="clockBtns">
        <button class="btn ghost" id="ckCancel">Annuleren</button>
        <button class="btn primary" id="ckOk">OK</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  verankerBijVeld(ov, ov.querySelector('.clockBox'), input);
  const dial = ov.querySelector('#ckDial'), hEl = ov.querySelector('#ckH'), mEl = ov.querySelector('#ckM');

  function head(){
    hEl.textContent = pad(h); mEl.textContent = pad(m);
    hEl.classList.toggle('on', mode==='h'); mEl.classList.toggle('on', mode==='m');
  }
  function drawDial(){
    dial.innerHTML = '<div class="ckHand" id="ckHand"></div><div class="ckDot"></div>';
    const R = 132;
    const addNum = (val, label, ang, r, sel, inner)=>{
      const el = document.createElement('button');
      el.className = 'ckNum'+(sel?' on':'')+(inner?' inner':'');
      el.textContent = label;
      const rad = ang*Math.PI/180;
      el.style.left = (R + Math.cos(rad)*r)+'px';
      el.style.top = (R + Math.sin(rad)*r)+'px';
      dial.appendChild(el);
    };
    if(mode==='h'){
      for(let i=0;i<24;i++){
        const outer = i < 12;
        addNum(i, i, (i%12)*30-90, outer ? R-26 : R-62, i===h, !outer);
      }
      hand((h%12)*30-90, h<12 ? R-26 : R-62);
    } else {
      for(let i=0;i<60;i+=5){
        addNum(i, pad(i), (i/5)*30-90, R-26, i===m, false);
      }
      hand((m/5)*30-90, R-26);
    }
  }
  function hand(ang, len){
    const el = dial.querySelector('#ckHand');
    el.style.width = (len-16)+'px';
    el.style.transform = 'rotate('+ang+'deg)';
  }
  hEl.onclick = ()=>{ mode='h'; head(); drawDial(); };
  mEl.onclick = ()=>{ mode='m'; head(); drawDial(); };

  // Slepen en tikken op de wijzerplaat
  function pick(e){
    const rect = dial.getBoundingClientRect();
    const dx = e.clientX - (rect.left + rect.width/2);
    const dy = e.clientY - (rect.top + rect.height/2);
    const dist = Math.hypot(dx,dy);
    let ang = Math.atan2(dy,dx)*180/Math.PI + 90;
    if(ang < 0) ang += 360;
    if(mode==='h'){
      const idx = Math.round(ang/30) % 12;
      const inner = dist < 88;           // binnenring = 12-23
      h = inner ? idx+12 : idx;
    } else {
      m = (Math.round(ang/30) % 12) * 5;
    }
    head(); drawDial();
  }
  let dragging = false;
  dial.addEventListener('pointerdown', (e)=>{
    e.preventDefault();
    dragging = true;
    dial.setPointerCapture(e.pointerId);
    pick(e);
  });
  dial.addEventListener('pointermove', (e)=>{ if(dragging) pick(e); });
  dial.addEventListener('pointerup', ()=>{
    dragging = false;
    if(mode==='h'){ mode='m'; head(); drawDial(); }
  });

  ov.querySelector('#ckCancel').onclick = ()=>ov.remove();
  ov.onclick = (e)=>{ if(e.target===ov) ov.remove(); };
  ov.querySelector('#ckOk').onclick = ()=>{
    input.value = pad(h)+':'+pad(m);
    ov.remove();
    input.dispatchEvent(new Event('change'));
  };
  head(); drawDial();
}

/* ============ RENDER ============ */
const content = document.getElementById('content');
let dayConflicts = new Set();

// Reserveringen die elkaar overlappen op dezelfde tafel
function berekenConflicten(list){
  const set = new Set();
  const perTafel = {};
  list.forEach(r=>{
    if(INACTIVE.has(r.status)) return;
    const s = tijdNaarMin(r.tijd), e = s+(r.duur||90);
    getTafels(r).forEach(nr=>{
      const key = r.loc+'|'+nr;
      (perTafel[key]=perTafel[key]||[]).push({id:r.id, s, e});
    });
  });
  Object.values(perTafel).forEach(arr=>{
    for(let i=0;i<arr.length;i++){
      for(let j=i+1;j<arr.length;j++){
        if(arr[i].s < arr[j].e && arr[j].s < arr[i].e){ set.add(arr[i].id); set.add(arr[j].id); }
      }
    }
  });
  return set;
}
const locTabs = document.getElementById('locTabs');

function esc(s){ return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function cardHTML(r, metTijd){

    </div>
    <div class="ctafel"${dayConflicts.has(r.id)?' style="color:#e5304d"':''}>${tfs.length?tfs.map(esc).join(', '):'-'}<small>${esc(r.loc)}</small></div>

/* --- Tafels: tijdlijn zoals DISH, alle locaties onder elkaar --- */
function tijdNaarMin(t){ const [h,m]=(t||'0:0').split(':').map(Number); return h*60+(m||0); }

const SHIFTS = {
  ochtend:{n:'Ochtend', s:6*60,  e:12*60},
  middag: {n:'Middag',  s:12*60, e:18*60},
  avond:  {n:'Avond',   s:18*60, e:27*60}
};
let tlShift = store.get('ct_shift','avond');
let tlZoom = 1;

function renderTafels(all){
  const sh = SHIFTS[tlShift] || SHIFTS.avond;
  locTabs.innerHTML =
    Object.entries(SHIFTS).map(([k,v])=>`<button class="${k===tlShift?'on':''}" data-s="${k}">${v.n}</button>`).join('') +
    `<span style="flex:1"></span>
     <button data-z="out">&minus;</button>
     <button data-z="reset">${Math.round(tlZoom*100)}%</button>
     <button data-z="in">+</button>`;
  locTabs.querySelectorAll('button[data-s]').forEach(b=>b.onclick=()=>{ tlShift=b.dataset.s; store.set('ct_shift',tlShift); render(); });
  locTabs.querySelectorAll('button[data-z]').forEach(b=>b.onclick=()=>{
    if(b.dataset.z==='in') tlZoom = Math.min(2, +(tlZoom+0.2).toFixed(1));
    else if(b.dataset.z==='out') tlZoom = Math.max(0.6, +(tlZoom-0.2).toFixed(1));
    else tlZoom = 1;
    render();
  });

  // Avondshift loopt door na middernacht: tijden voor 06:00 tellen als volgende dag
  const wrapMin = t => (tlShift==='avond' && t < 6*60) ? t+1440 : t;
  const start = sh.s, end = sh.e;
  const PXH = 150*tlZoom;
  const px = min => ((min-start)/60)*PXH;
  const totalW = px(end);

  // Nu-lijn (alleen op vandaag en binnen het venster)
  let nowX = -1;
  if(curDate === todayStr()){
    const nu = new Date();
    const nm = wrapMin(nu.getHours()*60+nu.getMinutes());
    if(nm >= start && nm <= end) nowX = px(nm);
  }

  // Uurmarkeringen
  let hoursHTML = '';
  for(let m=start; m<=end; m+=60){
    hoursHTML += `<div class="tlHour" style="left:${px(m)}px">${String(Math.floor(m/60)%24).padStart(2,'0')}:00</div>`;
  }
  if(nowX >= 0) hoursHTML += `<div class="tlNowDot" style="left:${nowX}px"></div>`;

  let rows = '';
  LOCS.forEach(loc=>{
    const tafels = parseTafels(tafelConfig[loc]||'');
    if(!tafels.length) return;
    rows += `<div class="tlLocRow">${esc(loc)}</div>`;
    const byTafel = {};
    all.filter(r=>r.loc===loc).forEach(r=>{ getTafels(r).forEach(nr=>{ (byTafel[nr]=byTafel[nr]||[]).push(r); }); });
    tafels.forEach(t=>{
      let blocks = '';
      (byTafel[t.nr]||[]).forEach(r=>{
        const eff = wrapMin(tijdNaarMin(r.tijd));
        const dur = r.duur||90;
        if(eff+dur <= start || eff >= end) return; // buiten deze shift
        const st = STATUS[r.status]||STATUS.res;
        const dim = INACTIVE.has(r.status);
        const s = px(eff);
        const w = Math.max(56, (dur/60)*PXH - 4);
        blocks += `<div class="tlBlock ${r.status==='in'?'in':''}${dim?' no':''}" style="left:${s}px;width:${w}px;border-left-color:${st.c}" onclick="openFormById('${r.id}')">
          <b>${r.pax}</b><span class="tlNaam">${esc(r.naam)}</span><span class="tlTag" style="background:${arrKleur(r.arr)}">${esc(r.arr)}</span>${r.notitie?`<span class="tlNote">${esc(r.notitie)}</span>`:''}
        </div>`;
      });
      rows += `<div class="tlRow">
        <div class="tlLabel" onclick="nieuwOpTafel('${esc(loc)}','${esc(t.nr)}')">${esc(t.nr)}<sup>${t.cap??''}</sup></div>
        <div class="tlTrack" style="width:${totalW}px">${gridHTML(start,end,px,nowX)}${blocks}</div>
      </div>`;
    });
  });

  const zonder = all.filter(r=>!getTafels(r).length);
  let zonderHTML = '';
  if(zonder.length){
    zonderHTML = '<div class="sectionH">Zonder tafel</div>' + zonder.map(r=>cardHTML(r, true)).join('');
  }

  content.innerHTML = rows
    ? `<div class="tlScroll"><div class="tlHead"><div class="tlLabel"></div><div class="tlHours" style="width:${totalW}px">${hoursHTML}</div></div>${rows}</div>${zonderHTML}`
    : '<div class="empty">Geen tafels gevonden.</div>';
}
function gridHTML(start,end,px,nowX){
  let g = '';
  for(let m=start; m<=end; m+=15){
    g += `<i class="tlGrid ${m%60===0?'':'q'}" style="left:${px(m)}px"></i>`;
  }
  if(nowX >= 0) g += `<i class="tlNow" style="left:${nowX}px"></i>`;
  return g;
}

function renderAZ(all){
  locTabs.innerHTML = '';
  const list = all.slice().sort((a,b)=>a.naam.localeCompare(b.naam,'nl',{sensitivity:'base'}));
  if(!list.length){ content.innerHTML = '<div class="empty">Helaas, geen reserveringen :-(</div>'; return; }
  let html = '', last = '';
  list.forEach(r=>{
    const L = (r.naam[0]||'#').toUpperCase();
    if(L!==last){ html += `<div class="azLetter">${esc(L)}</div>`; last = L; }
    html += cardHTML(r, true);
  });
  content.innerHTML = html;
}

/* --- Plattegrond: lijst + kaart + tijdschuif zoals DISH --- */
let editMode = false;
let mapZoom = 1;
let mapUserZoom = false;
let mapTijd = null;
// Canvasformaat per locatie (verhouding overgenomen van DISH)
const MAP_SIZE = {
  'Theaterrestaurant':{w:1450,h:940},
  'Le Cirque':{w:1150,h:780},
  'Circusbar':{w:950,h:490}
};
// Vormen zoals in DISH: rond, breed, rest vierkant
const TABLE_STYLE = {
  'Circusbar':{ round:'all' },
  'Le Cirque':{ round:['7','10','11','12','24','25','26','34','35','36'], wide:['27','40'] },
  'Theaterrestaurant':{ round:['125','126','141','152'], wide:['149'] }
};
function shapeClass(loc, nr){
  const s = TABLE_STYLE[loc]||{};
  if(s.round==='all' || (s.round||[]).includes(nr)) return 'round';
  if((s.wide||[]).includes(nr)) return 'wide';
  return '';
}

function renderMap(all){
  locTabs.innerHTML = '';
  if(!LOCS.includes(curLoc)) curLoc = LOCS[0];
  const tafels = parseTafels(tafelConfig[curLoc]||'');
  if(mapTijd === null){
    if(curDate === todayStr()){ const n = new Date(); mapTijd = n.getHours()*60 + n.getMinutes(); }
    else mapTijd = 19*60+30;
    mapTijd = Math.min(1620, Math.max(360, Math.round(mapTijd/15)*15));
  }
  const locRes = all.filter(r=>r.loc===curLoc)
    .slice().sort((a,b)=> a.tijd.localeCompare(b.tijd) || a.naam.localeCompare(b.naam,'nl'));

  let listHTML = '';
  let lastT = '';
  locRes.forEach(r=>{
    if(r.tijd !== lastT){ listHTML += `<div class="sectionH">${esc(r.tijd)}</div>`; lastT = r.tijd; }
    listHTML += cardHTML(r);
  });
  if(!listHTML) listHTML = '<div class="empty" style="padding:60px 10px">Helaas, geen reserveringen :-(</div>';

  content.innerHTML = `
    <div class="mapSplit">
      <div class="mapLeft">
        <div class="mapLocWrap"><select id="mapLocSel">${LOCS.map(l=>`<option ${l===curLoc?'selected':''}>${l}</option>`).join('')}</select></div>
        <div class="mapList">${listHTML}</div>
      </div>
      <div class="mapMain">
        <div class="mapBar">
          <button class="btn ${editMode?'primary':'ghost'}" id="mEdit">${editMode?'Klaar':'Indeling bewerken'}</button>
          ${editMode?'<button class="btn ghost" id="mAlign">Uitlijnen</button><button class="btn ghost" id="mReset">Standaard</button>':''}
          <input type="range" id="mapSl" min="360" max="1620" step="15" value="${mapTijd}">
          <span class="tijdBox" id="tijdBox">${minNaarTijd(mapTijd%1440)}</span>
          <button class="btn ghost" id="mZoomOut">&minus;</button>
          <button class="btn ghost" id="mZoomLbl">${Math.round(mapZoom*100)}%</button>
          <button class="btn ghost" id="mZoomIn">+</button>
        </div>
        <div id="mapWrap" class="${editMode?'editMode':''}"><div id="mapSizer"><div id="mapCanvas"></div></div></div>
        <div class="legend">
          <span><i style="background:var(--panel2);border:1px solid var(--line)"></i>Vrij</span>
          <span><i style="background:var(--accent2)"></i>Gereserveerd</span>
          <span><i style="background:#3ecf8e"></i>Aan tafel</span>
          <span style="margin-left:auto">Sleep om te schuiven</span>
        </div>
      </div>
    </div>`;
  const wrap = document.getElementById('mapWrap');
  const sizer = document.getElementById('mapSizer');
  const canvas = document.getElementById('mapCanvas');
  const size = MAP_SIZE[curLoc] || {w:1000,h:700};
  // Automatisch passend op de breedte (zoals DISH), verticaal scrollen mag
  if(!mapUserZoom){
    mapZoom = Math.max(0.25, Math.min(1.5, +((wrap.clientWidth-6)/size.w).toFixed(2)));
    const lbl = document.getElementById('mZoomLbl');
    if(lbl) lbl.textContent = Math.round(mapZoom*100)+'%';
  }
  sizer.style.width = (size.w*mapZoom)+'px';
  sizer.style.height = (size.h*mapZoom)+'px';
  canvas.style.width = size.w+'px';
  canvas.style.height = size.h+'px';
  canvas.style.transform = 'scale('+mapZoom+')';
  canvas.style.transformOrigin = '0 0';
  canvas.className = editMode ? 'editGrid' : '';

  const lay = layout[curLoc] = layout[curLoc] || {};
  // Positie: opgeslagen > standaard uit DISH > raster
  const def = DEFAULT_LAYOUT[curLoc] || {};
  const cols = Math.max(4, Math.ceil(Math.sqrt(tafels.length*1.4)));
  tafels.forEach((t,i)=>{
    if(!lay[t.nr]) lay[t.nr] = def[t.nr] ? {...def[t.nr]} : { x: 6 + (i%cols)*(88/Math.max(1,cols-1)), y: 5 + Math.floor(i/cols)*13 };
  });

  function paintTables(){
    canvas.innerHTML = '';
    // Bezetting op het gekozen tijdstip
    const byTafel = {};
    all.filter(r=>r.loc===curLoc).forEach(r=>{
      const s = tijdNaarMin(r.tijd), e = s + (r.duur||90);
      if(mapTijd >= s && mapTijd < e && !INACTIVE.has(r.status)){
        getTafels(r).forEach(nr=>{ byTafel[nr] = r; });
      }
    });
    tafels.forEach(t=>{
      const el = document.createElement('div');
      el.className = ('tbl '+shapeClass(curLoc,t.nr)).trim();
      const r = byTafel[t.nr];
      el.style.left = lay[t.nr].x+'%';
      el.style.top = lay[t.nr].y+'%';
      if(r){
        el.classList.add(r.status==='in' ? 'in' : 'res');
        el.innerHTML = `<span class="tnr2">${esc(t.nr)}</span><span class="tijdje">${esc(r.tijd)}-${minNaarTijd(tijdNaarMin(r.tijd)+(r.duur||90))}</span>`;
        const s = document.createElement('small');
        s.textContent = r.pax+' p. '+(r.naam.length>13 ? r.naam.slice(0,12)+'\u2026' : r.naam);
        el.appendChild(s);
      } else {
        el.textContent = t.nr;
      }
      addChairs(el, t.cap, el.classList.contains('round'));
      if(editMode){
        el.style.borderStyle = 'dashed';
        makeDraggable(el, t.nr, canvas, lay);
      } else {
        el.onclick = ()=>{
          if(r) openForm(r,false);
          else nieuwOpTafel(curLoc, t.nr);
        };
      }
      canvas.appendChild(el);
    });
  }
  paintTables();

  // Startpositie: midden van de tafels in beeld
  requestAnimationFrame(()=>{
    const xs = tafels.map(t=>lay[t.nr].x), ys = tafels.map(t=>lay[t.nr].y);
    if(xs.length){
      const cx = (Math.min(...xs)+Math.max(...xs))/2/100*size.w*mapZoom;
      const cy = (Math.min(...ys)+Math.max(...ys))/2/100*size.h*mapZoom;
      wrap.scrollLeft = cx - wrap.clientWidth/2;
      wrap.scrollTop = cy - wrap.clientHeight/2;
    }
  });

  // Zaalkeuze
  const mls = document.getElementById('mapLocSel');
  maakDropdown(mls);
  mls.onchange = ()=>{ curLoc = mls.value; store.set('ct_loc', curLoc); mapUserZoom = false; render(); };

  // Tijdschuif
  const sl = document.getElementById('mapSl');
  const tijdBox = document.getElementById('tijdBox');
  sl.oninput = ()=>{
    mapTijd = +sl.value;
    tijdBox.textContent = minNaarTijd(mapTijd%1440);
    paintTables();
  };

  document.getElementById('mEdit').onclick = ()=>{
    if(editMode){ store.set('ct_layout',layout); syncLayout(); }
    editMode = !editMode; render();
    if(!editMode) toast('Indeling opgeslagen');
  };
  const rst = document.getElementById('mReset');
  if(rst) rst.onclick = ()=>{ delete layout[curLoc]; store.set('ct_layout',layout); syncLayout(); render(); };
  const aln = document.getElementById('mAlign');
  if(aln) aln.onclick = ()=>{ alignLayout(lay); store.set('ct_layout',layout); syncLayout(); render(); toast('Tafels uitgelijnd'); };
  document.getElementById('mZoomIn').onclick = ()=>{ mapUserZoom = true; mapZoom = Math.min(2, +(mapZoom+0.15).toFixed(2)); render(); };
  document.getElementById('mZoomOut').onclick = ()=>{ mapUserZoom = true; mapZoom = Math.max(0.25, +(mapZoom-0.15).toFixed(2)); render(); };
  document.getElementById('mZoomLbl').onclick = ()=>{ mapUserZoom = false; render(); };
}

function addChairs(el, cap, isRound){
  const n = Math.min(cap || (isRound ? 4 : 2), 8);
  if(isRound){
    for(let i=0;i<n;i++){
      const a = (360/n)*i - 90;
      const c = document.createElement('div');
      c.className = 'chair';
      c.style.left = '50%'; c.style.top = '50%';
      c.style.transform = `translate(-50%,-50%) rotate(${a}deg) translateX(35px) rotate(90deg)`;
      el.appendChild(c);
    }
    return;
  }
  // Vierkant/breed: eerst links en rechts, dan boven en onder, dan dubbelen
  const spots = [
    {left:'-12px', top:'50%', tf:'translateY(-50%) rotate(90deg)'},
    {right:'-12px', top:'50%', tf:'translateY(-50%) rotate(90deg)'},
    {left:'50%', top:'-11px', tf:'translateX(-50%)'},
    {left:'50%', bottom:'-11px', tf:'translateX(-50%)'},
    {left:'28%', top:'-10px', tf:'translateX(-50%)'},
    {left:'72%', top:'-10px', tf:'translateX(-50%)'},
    {left:'28%', bottom:'-10px', tf:'translateX(-50%)'},
    {left:'72%', bottom:'-10px', tf:'translateX(-50%)'}
  ];
  for(let i=0;i<n;i++){
    const sp = spots[i]; if(!sp) break;
    const c = document.createElement('div');
    c.className = 'chair';
    Object.entries(sp).forEach(([k,v])=>{ if(k!=='tf') c.style[k]=v; });
    c.style.transform = sp.tf;
    el.appendChild(c);
  }
}

// Tafels die bijna op een lijn staan exact gelijk zetten
function alignLayout(lay){
  ['x','y'].forEach(axis=>{
    const vals = Object.keys(lay).map(k=>({k, v: lay[k][axis]})).sort((a,b)=>a.v-b.v);
    let group = [];
    const flush = ()=>{
      if(group.length > 1){
        const avg = group.reduce((s,g)=>s+g.v,0)/group.length;
        group.forEach(g=>{ lay[g.k][axis] = +avg.toFixed(1); });
      }
      group = [];
    };
    vals.forEach(item=>{
      if(!group.length || item.v - group[group.length-1].v <= 1.2) group.push(item);
      else { flush(); group = [item]; }
    });
    flush();
  });
}

function makeDraggable(el, tafel, canvas, lay){
  el.addEventListener('pointerdown', (e)=>{
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    const move = (ev)=>{
      const rect = canvas.getBoundingClientRect();
      let x = ((ev.clientX - rect.left)/rect.width)*100;
      let y = ((ev.clientY - rect.top)/rect.height)*100;
      x = Math.min(98, Math.max(2, x));
      y = Math.min(98, Math.max(2, y));
      // Magnetisch: klik vast op de lijn van andere tafels
      for(const [k,v] of Object.entries(lay)){
        if(k === tafel) continue;
        if(Math.abs(x - v.x) < 0.9) x = v.x;
        if(Math.abs(y - v.y) < 0.9) y = v.y;
      }
      lay[tafel] = {x:+x.toFixed(1), y:+y.toFixed(1)};
      el.style.left = x+'%';
      el.style.top = y+'%';
    };
    const up = ()=>{ el.removeEventListener('pointermove',move); el.removeEventListener('pointerup',up); };
    el.addEventListener('pointermove',move);
    el.addEventListener('pointerup',up);
  });
}

/* --- Print --- */
document.getElementById('btnPrint').onclick = ()=>window.print();

function toast(msg){
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2200);
}

render();
startSync();
</script>
